spring.application.name=Web_full
server.port=9000

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/webdata?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# SQL initialization
spring.sql.init.platform=mysql

# JPA configuration
## BỎ dòng này vì Hibernate tự động chọn dialect từ version MySQL
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
## DDL auto (create, update, create-drop, validate)
## Chú ý: "create" sẽ xóa và tạo lại bảng mỗi lần chạy
spring.jpa.hibernate.ddl-auto=update

# Tắt warning Open-in-view
spring.jpa.open-in-view=false

# Log SQL parameters (thêm để debug dễ hơn)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# File upload configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

auth.token.expirationlnMils=3600000
auth.token.jwtSecret=6D4571CA35224921EE5D14423414E52A982B075D5F17A63A293E1B394301BA59
# API prefix
api.prefix=/api/v1